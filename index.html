<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c151e;--s1:#111c27;--s2:#172333;--s3:#1e2f42;
  --bdr:#243548;--bdr2:#2e4460;
  --red:#c0392b;--red2:#e74c3c;--redg:rgba(192,57,43,.28);
  --gold:#d4a017;--goldf:rgba(212,160,23,.15);
  --chrome:#b0c8e0;--white:#eaf3fa;--dim:#3a526a;--steel:#5d7d99;
  --green:#17a44a;--green2:#22c55e;
  --warn:#d97706;--info:#0ea5e9;
  --r:6px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Barlow',sans-serif;background:var(--bg);color:var(--chrome);
  display:flex;flex-direction:column;
  background-image:
    radial-gradient(ellipse 120% 40% at 50% -8%,rgba(192,57,43,.09) 0%,transparent 60%),
    linear-gradient(rgba(255,255,255,.009) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.009) 1px,transparent 1px);
  background-size:100% 100%,56px 56px,56px 56px;
  -webkit-tap-highlight-color:transparent;
}

.topbar{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--bdr);background:rgba(12,21,30,.92);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;color:var(--white);line-height:1;white-space:nowrap}
.logo em{color:var(--red);font-style:normal}
.logo small{font-size:.9rem;color:var(--steel);letter-spacing:.06em}
.topbar-mid{flex:1;display:flex;align-items:center;gap:8px;min-width:0}


.chip{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.08em;padding:4px 10px;border-radius:20px;white-space:nowrap}



.topbar-right{display:flex;gap:6px;flex-shrink:0}
.tb{background:transparent;border:1px solid var(--bdr);border-radius:var(--r);color:var(--steel);font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tb svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}
.tb:hover{border-color:var(--steel);color:var(--chrome)}
.tb.active{background:var(--red);border-color:var(--red);color:#fff}

.body{flex:1;display:flex;overflow:hidden;min-height:0}

.sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;background:rgba(11,18,26,.6)}
.sidebar-hdr{padding:10px 12px;border-bottom:1px solid var(--bdr);font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
.cat-nav{flex:1;overflow-y:auto;padding:6px 0}
.cat-nav::-webkit-scrollbar{width:3px}
.cat-nav::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.cat-nav-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:background .12s;border-left:2px solid transparent}
.cat-nav-item:hover{background:rgba(255,255,255,.03)}
.cat-nav-item.active{background:rgba(192,57,43,.1);border-left-color:var(--red)}
.cat-nav-item.active .cni-name{color:var(--white)}
.cni-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cni-name{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.06em;color:var(--steel);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cni-count{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;color:var(--dim)}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:6px}
.sf-btn{background:transparent;border:1px solid var(--bdr);border-radius:4px;color:var(--steel);font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:7px 10px;cursor:pointer;transition:all .15s;text-align:center}
.sf-btn:hover{border-color:var(--red);color:var(--red)}
.sf-btn.danger:hover{background:rgba(127,29,29,.3)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.rec-bar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr);background:var(--s1);flex-wrap:wrap;row-gap:8px}
#recBtn{display:flex;align-items:center;gap:10px;padding:10px 20px;background:linear-gradient(135deg,#a93226,var(--red));color:#fff;border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 3px 16px var(--redg);flex-shrink:0}
#recBtn:hover{box-shadow:0 5px 24px rgba(192,57,43,.5);transform:translateY(-1px)}
#recBtn.live{background:linear-gradient(135deg,#145a32,var(--green));animation:rp 2s infinite}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}55%{box-shadow:0 0 0 14px rgba(34,197,94,0)}}
#recBtn.sleeping{background:linear-gradient(135deg,#1a2535,#243548);animation:none;opacity:.75;box-shadow:none}
#recBtn.sleeping:hover{opacity:1;box-shadow:0 3px 14px rgba(192,57,43,.35)}
.sleep-dots{display:none;align-items:center;gap:4px}
.sleeping .sleep-dots{display:flex}
.sleeping .wave{display:none}
.sleep-dots span{width:5px;height:5px;border-radius:50%;background:rgba(180,200,224,.55);animation:sd 1.4s ease-in-out infinite}
.sleep-dots span:nth-child(2){animation-delay:.22s}.sleep-dots span:nth-child(3){animation-delay:.44s}
@keyframes sd{0%,80%,100%{transform:scale(.55);opacity:.25}40%{transform:scale(1);opacity:1}}
.wave{display:none;align-items:center;gap:2px;height:16px}
.live .wave{display:flex}
.wave b{display:block;width:2.5px;background:rgba(255,255,255,.85);border-radius:2px;animation:wb 1s ease-in-out infinite}
.wave b:nth-child(1){height:4px;animation-delay:0s}.wave b:nth-child(2){height:13px;animation-delay:.1s}
.wave b:nth-child(3){height:8px;animation-delay:.2s}.wave b:nth-child(4){height:15px;animation-delay:.05s}
.wave b:nth-child(5){height:6px;animation-delay:.15s}.wave b:nth-child(6){height:11px;animation-delay:.25s}
@keyframes wb{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.25)}}
.rec-mid{flex:1;min-width:140px}
.live-prev{font-size:.82rem;color:var(--steel);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}
.session-info{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;color:var(--dim);letter-spacing:.06em;padding:0 4px}
.rec-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.manual-inp{display:flex;flex:1;min-width:180px;background:var(--s3);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.manual-inp input{background:transparent;border:none;outline:none;padding:9px 14px;font-family:'Barlow',sans-serif;font-size:.9rem;color:var(--white);flex:1;width:0;min-width:0}
.manual-inp input::placeholder{color:var(--dim);font-size:.78rem}
.manual-inp button{background:var(--bdr2);border:none;border-left:1px solid rgba(255,255,255,.05);color:var(--chrome);padding:7px 12px;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap}
.manual-inp button:hover{background:var(--red);color:#fff}

/* ── format mode bar ── */
.fmt-bar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bdr);background:var(--s1)}
.fmt-label{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);flex-shrink:0}
.fmt-pills{display:flex;gap:5px;flex-wrap:wrap}
.fmp{
  display:flex;align-items:center;gap:5px;
  background:transparent;border:1px solid var(--bdr);border-radius:5px;
  color:var(--steel);font-family:'Barlow Condensed',sans-serif;
  font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:5px 11px;cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1.2;
}
.fmp svg{width:14px;height:14px;flex-shrink:0;opacity:.7}
.fmp:hover{border-color:var(--steel);color:var(--chrome);background:rgba(255,255,255,.03)}
.fmp.on{background:rgba(192,57,43,.18);border-color:var(--red);color:var(--white)}
.fmp.on svg{opacity:1}

.list-panel{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.list-panel::-webkit-scrollbar{width:6px}
.list-panel::-webkit-scrollbar-track{background:transparent}
.list-panel::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

.cat-group-hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(0,0,0,.45);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10;cursor:pointer;user-select:none;transition:background .12s;backdrop-filter:blur(4px)}
.cat-group-hdr:hover{background:rgba(0,0,0,.6)}
.cgh-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cgh-name{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--steel);flex:1}
.cgh-meta{display:flex;align-items:center;gap:8px}
.cgh-count{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;color:var(--dim)}
.cgh-toggle{font-size:.7rem;color:var(--dim);transition:transform .2s;display:inline-block}
.cat-group.collapsed .cgh-toggle{transform:rotate(-90deg)}
.cat-group-body{overflow:hidden}
.cat-group.collapsed .cat-group-body{display:none}

.item{display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(36,53,72,.45);transition:background .1s;position:relative}
.item:hover{background:rgba(255,255,255,.018)}
.item.done{opacity:.55}
.item.done .item-text{text-decoration:line-through;color:var(--dim)}
.item-num{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;color:var(--red);text-align:right;padding-right:8px;border-right:2px solid var(--bdr);line-height:1}
.item-bullet{font-size:1.1rem;color:var(--steel);border-right:none;padding-right:4px;text-align:center;font-family:serif}
.item-body{display:flex;flex-direction:column;gap:2px;min-width:0}
.item-text{font-size:.88rem;font-weight:500;color:var(--white);word-break:break-word;line-height:1.35;outline:none;border-bottom:1px solid transparent;padding-bottom:1px;transition:border-color .15s}
.item-text:focus{border-bottom-color:var(--red2);caret-color:var(--red2)}
.item-tags{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:1px;min-height:0}

/* ── format modes ── */
/* bullets: replace item-num with a bullet dot */
body.fmt-bullets .item-num{font-size:1rem;color:var(--chrome);border-right:none;padding-right:4px;text-align:center;line-height:1}
body.fmt-bullets .item-num::before{content:'•';font-size:1.1rem;color:var(--steel)}
body.fmt-bullets .item-num{font-size:0;} /* hide number text */
body.fmt-bullets .item-num::before{font-size:1.2rem}
/* numbered: bold red numbers, no category groups visible */
body.fmt-numbered .item-num{font-size:.85rem;font-weight:800;color:var(--red);border-right:2px solid var(--bdr)}
/* compact: tighter rows, hide tags */
body.fmt-compact .item{padding:5px 12px;gap:8px}
body.fmt-compact .item-tags{display:none}
body.fmt-compact .item-text{font-size:.82rem}
/* grouped: default, no changes needed */
.brand-tag{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:1px 6px;border-radius:3px;border:1px solid}
.meas-tag{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.06em;color:var(--gold);background:var(--goldf);border:1px solid rgba(212,160,23,.3);border-radius:3px;padding:1px 6px}
.item-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.item:hover .item-actions,.item:focus-within .item-actions{opacity:1}
@media(hover:none){.item-actions{opacity:1}}
.ia{background:transparent;border:1px solid var(--bdr);border-radius:4px;color:var(--dim);font-size:.65rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.04em;padding:3px 7px;cursor:pointer;text-transform:uppercase;transition:all .13s;line-height:1.2;white-space:nowrap}
.ia:hover{background:var(--red);border-color:var(--red);color:#fff}
.ia.ok:hover{background:var(--green);border-color:var(--green);color:#fff}
.ia.del:hover{background:rgba(127,29,29,.7);border-color:#7f1d1d;color:#fca5a5}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:12px;opacity:.3}
.empty-state svg{width:40px;height:40px;fill:var(--steel)}
.empty-state p{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);text-align:center}

.exp-panel{flex-shrink:0;border-top:1px solid var(--bdr);background:var(--s1);padding:12px 14px;display:none}
.exp-panel.open{display:block}
.ep-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ep-field{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px}
.ep-field label{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--steel);display:block;margin-bottom:2px}
.ep-field input{background:transparent;border:none;outline:none;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:600;color:var(--white);width:100%}
.ep-field input::placeholder{color:var(--dim)}
.ep-btns{display:flex;gap:8px;flex-wrap:wrap}
.ep-btn{flex:1;min-width:140px;padding:11px 14px;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .18s;border:2px solid transparent}
.ep-btn:disabled{opacity:.3;cursor:not-allowed}
.ep-btn svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}
.ep-btn.pdf{background:var(--s2);border-color:var(--steel);color:var(--chrome)}
.ep-btn.pdf:not(:disabled):hover{background:var(--white);border-color:var(--white);color:var(--bg)}
.ep-btn.sms{background:var(--s2);border-color:var(--green2);color:var(--green2)}
.ep-btn.sms:not(:disabled):hover{background:var(--green2);color:#fff}

<script>
'use strict';

/* ══ CONFIG ══ */
const DEFAULT_CFG = {
  unitSystem:'imperial', precLevel:2, measFmt:'symbol', detectMeas:true,
  minConf:0, autoCorrect:true, detectBrand:true,
  sinkDone:false, autoSave:true, compact:false,
};
let CFG = {...DEFAULT_CFG};

/* ══ MEASUREMENT ENGINE — full rebuild ══
   Handles ALL spoken patterns:
     "three quarter inch elbow"         → ¾" elbow
     "one and a half inch coupling"     → 1½" coupling
     "two and three eighths inch"       → 2⅜"
     "ten foot stick of copper"         → 10' stick of copper
     "two foot six"                     → 2'-6"
     "twelve feet"                      → 12'
     "ten pieces of three quarter"      → 10 pcs of ¾"
     "box of one inch"                  → box of 1"
     "6 inch"  /  "6\""  /  "3/4 inch" → 6" / ¾"
     "one inch by three quarter"        → 1" x ¾"
   Key fix: measurement is extracted INLINE mid-sentence, preserving
   surrounding text rather than consuming the whole string.
══ */

// Fraction spoken-word → decimal value
const FRACS = {
  'fifteen sixteenths':0.9375,'thirteen sixteenths':0.8125,
  'eleven sixteenths':0.6875,'nine sixteenths':0.5625,
  'seven sixteenths':0.4375,'seven eighths':0.875,
  'five sixteenths':0.3125,'five eighths':0.625,
  'three sixteenths':0.1875,'three quarters':0.75,'three quarter':0.75,
  'three eighths':0.375,'one sixteenth':0.0625,'one quarter':0.25,
  'one eighth':0.125,'one half':0.5,'an eighth':0.125,
  'a quarter':0.25,'a half':0.5,'quarter':0.25,'half':0.5,
};

// Whole spoken numbers → value (sorted longest first at build time)
const WNUMS_RAW = {
  'twenty nine':29,'twenty eight':28,'twenty seven':27,'twenty six':26,
  'twenty five':25,'twenty four':24,'twenty three':23,'twenty two':22,
  'twenty one':21,nineteen:19,eighteen:18,seventeen:17,sixteen:16,
  fifteen:15,fourteen:14,thirteen:13,twelve:12,eleven:11,twenty:20,
  ten:10,nine:9,eight:8,seven:7,thirty:30,forty:40,fifty:50,sixty:60,
  seventy:70,eighty:80,ninety:90,six:6,five:5,four:4,three:3,two:2,one:1,zero:0,
};
// Fraction symbol lookup
const FSYMS = {'0.5':'½','0.25':'¼','0.75':'¾','0.125':'⅛','0.375':'⅜','0.625':'⅝','0.875':'⅞'};

function roundToPrecision(value){
  const slots = [1, 0.5, 0.25, 0.125, 0.0625];
  const slot = slots[Math.min(CFG.precLevel, 4)] || 0.25;
  return Math.round(value / slot) * slot;
}

function fmtInch(value){
  // Format a pure inch value as a fraction/symbol string
  const rounded = roundToPrecision(value);
  const whole = Math.floor(rounded);
  const frac = +(rounded - whole).toFixed(5);
  const fmt = CFG.measFmt;

  if(fmt === 'decimal') return `${rounded}"`;
  if(fmt === 'words'){
    const match = Object.entries(FRACS).find(([,v]) => Math.abs(v - frac) < 0.002);
    const fs = frac ? (' and ' + (match ? match[0] : `${frac}`)) : '';
    return `${whole}${fs} inch${rounded !== 1 ? 'es' : ''}`;
  }
  // symbol (default)
  const fsym = frac ? (FSYMS[frac.toFixed(4)] || FSYMS[String(+(frac).toFixed(3))] || `${Math.round(frac*16)}/16`) : '';
  if(whole === 0 && fsym) return `${fsym}"`;
  if(fsym) return `${whole}${fsym}"`;
  return `${whole}"`;
}

function fmtFeet(ftVal, inVal){
  // ftVal = whole feet, inVal = remaining inches (may be 0)
  const fmt = CFG.measFmt;
  const ftR = Math.floor(ftVal);
  if(!inVal || inVal === 0){
    if(fmt === 'words') return `${ftR} ${ftR===1?'foot':'feet'}`;
    return `${ftR}'`;
  }
  const inFmt = fmtInch(inVal);
  if(fmt === 'words') return `${ftR} ${ftR===1?'foot':'feet'} ${inVal} inches`;
  return `${ftR}'-${inFmt}`;
}

// ── Core measurement parser (v3 — token-leak fix) ──
// BUG FIXED: previous version tokenized digits INSIDE existing §tokens§,
// causing §N3§ to appear in "20 §N3§-0.25 inch 90s".
// Fix: process numeric fractions and plain digits BEFORE word tokenization,
// and use a single-pass regex that never re-enters already-replaced text.
function parseMeas(text){
  if(!text || !text.trim()) return text;
  let work = text.toLowerCase()
    .replace(/\bby\b/gi, ' x ');

  // ── Pre-step: protect QTY - SIZE patterns BEFORE dashes are stripped ──────
  // Spoken as "five - one inch 90s", "5 - 1/2 inch 90s", "5 - 1 1/4 inch 90s"
  // Without this, the dash-strip collapses "5 - 1/2" → "5 1 2" (slash→drop)
  // or "5 - 1" → "5 1" then Step 2E wrongly fires before the size fraction forms.
  // Covers nominal sizes up to 2": whole (½,¾,1,1¼,1½,2) + fractions (N/D).
  // Must run before the blanket \s*-\s* strip below.
  work = work
    // QTY - WHOLE DIGIT / DIGIT  (e.g. "5 - 1 1/4", "5 - 2 1/2")
    .replace(/\b(\d+|twenty[\s\w]+|nineteen|eighteen|seventeen|sixteen|fifteen|fourteen|thirteen|twelve|eleven|ten|nine|eight|seven|six|five|four|three|two|one)\s*-\s*(\d+)\s+(\d+)\s*\/\s*(\d+)\s*(?:inch(?:es)?|in\b|")?(?=\s|$)/gi,
      (_, qr, whole, num, den) => {
        const nw = {twenty:20,nineteen:19,eighteen:18,seventeen:17,sixteen:16,fifteen:15,fourteen:14,thirteen:13,twelve:12,eleven:11,ten:10,nine:9,eight:8,seven:7,six:6,five:5,four:4,three:3,two:2,one:1};
        const qty = /^\d+$/.test(qr.trim()) ? parseInt(qr) : (nw[qr.trim().toLowerCase()] ?? null);
        const d = parseInt(den);
        if(qty == null || !d || qty < 2) return _;
        const size = parseInt(whole) + parseInt(num)/d;
        if(size > 2.5) return _; // only up to 2½"
        return `§QTY${qty}§ ${fmtInch(size)} `;
      })
    // QTY - DIGIT/DIGIT fraction only (e.g. "5 - 1/2", "12 - 3/4")
    .replace(/\b(\d+|twenty[\s\w]+|nineteen|eighteen|seventeen|sixteen|fifteen|fourteen|thirteen|twelve|eleven|ten|nine|eight|seven|six|five|four|three|two|one)\s*-\s*(\d+)\s*\/\s*(\d+)\s*(?:inch(?:es)?|in\b|")?(?=\s|$)/gi,
      (_, qr, num, den) => {
        const nw = {twenty:20,nineteen:19,eighteen:18,seventeen:17,sixteen:16,fifteen:15,fourteen:14,thirteen:13,twelve:12,eleven:11,ten:10,nine:9,eight:8,seven:7,six:6,five:5,four:4,three:3,two:2,one:1};
        const qty = /^\d+$/.test(qr.trim()) ? parseInt(qr) : (nw[qr.trim().toLowerCase()] ?? null);
        const d = parseInt(den);
        if(qty == null || !d || qty < 2) return _;
        const frac = parseInt(num)/d;
        if(frac > 2) return _; // only up to 2"
        return `§QTY${qty}§ ${fmtInch(frac)} `;
      })
    // QTY - WHOLE DIGIT (e.g. "5 - 1 inch", "10 - 2 inch") — sizes 1" and 2" only
    .replace(/\b(\d+|twenty[\s\w]+|nineteen|eighteen|seventeen|sixteen|fifteen|fourteen|thirteen|twelve|eleven|ten|nine|eight|seven|six|five|four|three|two|one)\s*-\s*(1|2)\s*(?:inch(?:es)?|in\b|")?(?=\s|$)/gi,
      (_, qr, sz) => {
        const nw = {twenty:20,nineteen:19,eighteen:18,seventeen:17,sixteen:16,fifteen:15,fourteen:14,thirteen:13,twelve:12,eleven:11,ten:10,nine:9,eight:8,seven:7,six:6,five:5,four:4,three:3,two:2,one:1};
        const qty = /^\d+$/.test(qr.trim()) ? parseInt(qr) : (nw[qr.trim().toLowerCase()] ?? null);
        if(qty == null || qty < 2) return _;
        return `§QTY${qty}§ ${fmtInch(parseInt(sz))} `;
      });

  work = work
    .replace(/\s*-\s*/g, ' ')   // normalize dashes: "5 - 3/4" → "5 3/4"
    .replace(/\s+/g, ' ')
    .trim();

  // Build lookup helpers once
  const NWP = Object.keys(WNUMS_RAW).sort((a,b)=>b.length-a.length)
    .map(w=>w.replace(/\s+/g,'\\s+')).join('|');
  const SNW = ['twelve','eleven','ten','nine','eight','seven','six','five','four','three','two','one'];
  const SWP = SNW.map(w=>w.replace(/\s+/g,'\\s+')).join('|');
  const FWP = Object.keys(FRACS).sort((a,b)=>b.length-a.length)
    .map(w=>w.replace(/\s+/g,'\\s+')).join('|');
  function wn(s){ return WNUMS_RAW[s.toLowerCase().replace(/\s+/g,' ')]; }
  function wf(s){ return FRACS[s.toLowerCase().replace(/\s+/g,' ')]; }
  function rq(s){ return /^\d+$/.test(s.trim()) ? parseInt(s) : wn(s); }

  function isKnownNum(a,b){ return WNUMS_RAW[(a+' '+b).replace(/\s+/g,' ').trim()] != null; }

  // ── Step 1: degree shorthand — MUST run first so trade terms exist for Step 2 lookahead ──

    .replace(/\b90s\b/gi, '90 degree elbows')
    .replace(/\b45s\b/gi, '45 degree elbows')
    .replace(/\bnineties\b/gi, '90 degree elbows')
    .replace(/\bninety\s*degree\b/gi, '90 degree')
    .replace(/\bforty\s*five\s*degree\b/gi, '45 degree');

  // ── Step 2: QTY + SIZE + TRADE lookahead ────────────────────────────────

  // absorb N into the size (e.g. "5 1 1/4 90 degree elbows" → 5 qty, 1¼" size)
  //
  // Trade term lookahead — allows an optional degree-number before the term
  // so "5 ¾" [90 ]degree elbow" and "5 1" [j ]hanger" both match
  const TRADE = 'degree|elbow(?:s)?|tee(?:s)?|coupling(?:s)?|nipple(?:s)?|valve(?:s)?|' +
    'hanger(?:s)?|clamp(?:s)?|fitting(?:s)?|bushing(?:s)?|reducer(?:s)?|cap(?:s)?|' +
    'union(?:s)?|adapter(?:s)?|pipe|tubing|connector(?:s)?|mip|fip|ftg|npt|' +
    'pex|pvc|cpvc|copper|ball|check|gate|globe|bend(?:s)?|clevis|riser|' +
    'strap(?:s)?|wye|cross|plug(?:s)?|saddle(?:s)?|j[-\\s]?hang|' +
    'all[-\\s]?thread|rod(?:s)?|sch(?:edule)?|type\\s*[lkm]|cast|no-hub|tyler|abi';

    new RegExp(`\\b(${NWP}|\\d+)\\s+(\\d+|${SWP})\\s+and\\s+(?:a\\s+|an\\s+)?(${FWP})\\s*(?:inch(?:es)?|in\\b)?\\s*${TLA}`, 'gi'),

      const qty=rq(qr), whole=rq(wr), frac=wf(fr);
      if(qty==null||whole==null||frac==null||qty<2||whole>12) return _;
      return `§QTY${qty}§ ${fmtInch(whole+frac)} `;
    });

  work = work.replace(
    new RegExp(`\\b(${NWP}|\\d+)\\s+(\\d+)\\s+(\\d+)\\s*\\/\\s*(\\d+)\\s*(?:inch(?:es)?|in\\b|")?\\s*${TLA}`, 'gi'),
    (_, qr, whole, num, den) => {
      const qty=rq(qr), d=parseInt(den);
      if(qty==null||!d||qty<2||parseInt(whole)>12) return _;
      return `§QTY${qty}§ ${fmtInch(parseInt(whole)+parseInt(num)/d)} `;
    });

  // Guard: skip if qty_word+frac_word is itself a known fraction ("three quarter" = ¾)
  work = work.replace(
    new RegExp(`\\b(${NWP}|\\d+)\\s+(${FWP})\\s*(?:inch(?:es)?|in\\b)?\\s*${TLA}`, 'gi'),
    (_, qr, fr) => {
      const qty=rq(qr), frac=wf(fr);
      if(qty==null||frac==null||qty<2) return _;
      if(isKnownFrac(qr.trim(), fr.trim())) return _;
      return `§QTY${qty}§ ${fmtInch(frac)} `;
    });

  // 2D: qty + digit/digit fraction  →  "5 3/4 90 degree" / "12 3/4 elbows"
  // Guard: skip if qty+frac = common compound pipe size ("2 1/2" = 2½")
  work = work.replace(
    new RegExp(`\\b(${NWP}|\\d+)\\s+(\\d+)\\s*\\/\\s*(\\d+)\\s*(?:inch(?:es)?|in\\b|")?\\s*${TLA}`, 'gi'),
    (_, qr, num, den) => {
      const qty=rq(qr), d=parseInt(den);
      if(qty==null||!d||qty<2) return _;
      const frac=parseInt(num)/d;
      if(isCpd(qty,frac)) return _;
      return `§QTY${qty}§ ${fmtInch(frac)} `;
    });

  work = work.replace(
    new RegExp(`\\b(${NWP}|\\d+)\\s+(\\d+)\\s*(?:inch(?:es)?|in\\b|")?\\s*${TLA}`, 'gi'),
    (_, qr, sr) => {
      const qty=rq(qr), size=parseInt(sr);
      if(qty==null||size<1||size>24||qty<2) return _;
      return `§QTY${qty}§ ${fmtInch(size)} `;
    });

  // 2F: qty + word size  →  "five one j hangers"
  work = work.replace(
    new RegExp(`\\b(${NWP}|\\d+)\\s+(${SWP})\\s*(?:inch(?:es)?|in\\b)?\\s*${TLA}`, 'gi'),
    (_, qr, sr) => {
      const qty=rq(qr), size=wn(sr);
      if(qty==null||size==null||size<1||size>12||qty<2) return _;
      if(isKnownNum(qr.trim(), sr.trim())) return _;
      return `§QTY${qty}§ ${fmtInch(size)} `;
    });

  // ── Step 3: compound digit fractions — now safe, qty is protected ────────
  work = work.replace(/(\d+)\s+(\d+)\s*\/\s*(\d+)(?=\s*(?:inch(?:es)?|in\b|foot|feet|ft\b|"|'|\s|$))/gi,
    (_, whole, num, den) => {
      const d=parseInt(den); if(!d) return _;
      return fmtInch(parseInt(whole)+parseInt(num)/d)+' ';
    });

  // ── Step 4: spoken fraction phrases ─────────────────────────────────────
  const fracSorted = Object.entries(FRACS).sort((a,b)=>b[0].length-a[0].length);
  const UNIT_RE = '(?:inch(?:es)?|in\\b|foot|feet|ft\\b|mm|cm)';
  for(const [phrase, fracVal] of fracSorted){
    const fe = phrase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    work = work.replace(new RegExp(`\\b(${NWP})\\s+and\\s+(?:a\\s+|an\\s+)?${fe}(?:\\s+${UNIT_RE})?`,'gi'),
      (_,wr)=>{ const n=wn(wr); return n!=null ? fmtInch(n+fracVal)+' ' : _; });
    work = work.replace(new RegExp(`\\b(\\d+)\\s+and\\s+(?:a\\s+|an\\s+)?${fe}(?:\\s+${UNIT_RE})?`,'gi'),
      (_,d)=>fmtInch(parseInt(d)+fracVal)+' ');
    work = work.replace(new RegExp(`\\b${fe}(?:\\s+${UNIT_RE}|(?=\\s+(?:mip|fip|ftg|npt|copper|pipe|fitting|elbow|tee|coupling|union|nipple|valve|adapter|ball|bushing|reducer)))`,'gi'),

  // ── Step 5: digit fractions with explicit unit ───────────────────────────
  work = work.replace(/(\d+)\s*\/\s*(\d+)\s*(?:inch(?:es)?|in\b|foot|feet|ft\b|mm|cm|"|')/gi,
    (m,n,d)=>{ const dv=parseInt(d); if(!dv) return m;
      const u=m.replace(/^[\d\/\s]+/,'').trim();
      return (/foot|feet|ft|'/.test(u)?fmtFeet(parseInt(n)/dv,0):fmtInch(parseInt(n)/dv))+' '; });

    (_,n,d)=>{ const dv=parseInt(d); if(!dv) return _; return fmtInch(parseInt(n)/dv)+' '; });

  // ── Step 6: spoken foot / inch ───────────────────────────────────────────
  work = work.replace(
    new RegExp(`\\b(${NWP})\\s+(?:foot|feet|ft)\\s+(${NWP})\\b(?!\\s*(?:inch|foot|feet|ft))`, 'gi'),
    (_,fw,iw)=>{ const ft=wn(fw),ins=wn(iw);
      return (ft!=null&&ins!=null&&ins<=11)?fmtFeet(ft,ins)+' ':_; });
  work = work.replace(new RegExp(`\\b(${NWP})\\s+(?:foot|feet|ft)\\b`,'gi'),
    (_,wr)=>{ const n=wn(wr); return n!=null?fmtFeet(n,0)+' ':_; });
  work = work.replace(new RegExp(`\\b(${NWP})\\s+(?:inch(?:es)?)\\b`,'gi'),
    (_,wr)=>{ const n=wn(wr); return n!=null?fmtInch(n)+' ':_; });
  work = work.replace(/(\d+)\s*(?:foot|feet|ft)\s+(\d+)(?:\s*(?:inch(?:es)?|in\b|"))?/gi,
    (_,ft,ins)=>fmtFeet(parseInt(ft),parseInt(ins)));
  work = work.replace(/(\d+(?:\.\d+)?)\s*(?:foot|feet|ft\b)/gi,(_,n)=>fmtFeet(parseFloat(n),0));
  work = work.replace(/(\d+(?:\.\d+)?)\s*(?:inch(?:es)?|in\b|")/gi,(_,n)=>fmtInch(parseFloat(n)));
  work = work.replace(/([¼½¾⅛⅜⅝⅞]"|\d+[¼½¾⅛⅜⅝⅞]?"?)\s+inch(?:es)?\b/gi,(_,m)=>m+' ');

  // ── Step 7: bare size digit after 'x' connector only ────────────────────
  // e.g. "1¼\" x 1 reducer" — the x-connector implies size context
  // Removed: lone digit before trade term (caused "1 coupling" → "1\" coupling")
  work = work.replace(/\bx\s+([1-6])\s+(?=[a-z])/gi,(_,n)=>'x '+fmtInch(parseInt(n))+' ');

  // ── Step 8: restore QTY tokens + safety net ──────────────────────────────
  work = work.replace(/§QTY(\d+)§/g,'$1');
  work = work.replace(/§[NF](\d+(?:\.\d+)?)§/g,'$1');

  // ── Step 9: convert any remaining spoken number words to digits ──────────
  // Catches qty words that weren't consumed by Steps 2A-F (e.g. no trade lookahead match)
  const WORD_TO_NUM = [
    ['twenty nine',29],['twenty eight',28],['twenty seven',27],['twenty six',26],
    ['twenty five',25],['twenty four',24],['twenty three',23],['twenty two',22],
    ['twenty one',21],['twenty',20],['nineteen',19],['eighteen',18],
    ['seventeen',17],['sixteen',16],['fifteen',15],['fourteen',14],
    ['thirteen',13],['twelve',12],['eleven',11],['ten',10],
    ['nine',9],['eight',8],['seven',7],['six',6],['five',5],
    ['four',4],['three',3],['two',2],['one',1],
  ];
  for(const [word, num] of WORD_TO_NUM){
    const re = new RegExp('\\b' + word + '\\b', 'gi');
    work = work.replace(re, String(num));
  }

  return work.replace(/\s+/g,' ').trim();
}
function hasMeas(t){
  if(!t) return false;
  return /\d[\s]*["']/.test(t)
    || /\b\d+\s*(?:inch|foot|feet|ft|mm|cm)\b/i.test(t)
    || /[¼½¾⅛⅜⅝⅞]/.test(t)
    || /\b(?:half|quarter|eighth|sixteenth)\s+inch/i.test(t)
    || /\d+'\s*-?\s*\d+"/.test(t);
}

/* ══ CORRECTIONS — secondary pass for anything phonetic missed ══ */
const CORR = {
  // Pipe schedules
  '\bschedule forty\b':'schedule 40','\bschedule eighty\b':'schedule 80',
  '\bschedule ten\b':'schedule 10','\bschedule one sixty\b':'schedule 160',
  '\bextra heavy\b':'XH','\bdouble extra heavy\b':'XXH',
  '\bstandard weight\b':'STD','\bextra strong\b':'XS',
  // Measurement shortcuts
  '\bsquare feet\b':'SF','\bsquare foot\b':'SF',
  // Any remaining mis-hears not caught by phonetic layer
  '\bgalvanize\b':'galvanized',
  '\bpressure gauge\b':'pressure gauge',
  '\bair admittance\b':'air admittance valve',
};

/* Apply phonetic corrections FIRST, then secondary CORR map */
function correct(raw){
  if(!CFG.autoCorrect || !raw) return raw;
  let t = raw;
  // Pass 1: phonetic (runs on raw engine output)
  for(const [re, rep] of PHONETIC){
    try{ t = t.replace(re, rep); }catch(e){}
  }
  // Pass 2: secondary word-boundary corrections
  for(const [pat, rep] of Object.entries(CORR)){
    try{ t = t.replace(new RegExp(pat, 'gi'), rep); }catch(e){}
  }
  return t;
}

function scoreAlternative(transcript){
  const lower = transcript.toLowerCase();
  let score = 0;
  for(const term of TRADE_SCORE_TERMS){
    if(lower.includes(term)) score += term.split(' ').length; // multi-word = higher weight
  }
  return score;
}

function pickBestAlt(results){
  // results is a SpeechRecognitionResultList entry
  if(!results || results.length === 0) return '';
  let best = results[0].transcript;
  let bestScore = -1;
  for(let i = 0; i < results.length; i++){
    const alt = results[i];
    // Must meet confidence threshold
    if(alt.confidence < CFG.minConf) continue;
    const raw = alt.transcript;
    // Apply phonetic correction to each alternative before scoring
    const corrected = correct(raw);
    const score = scoreAlternative(corrected) + (alt.confidence * 2); // confidence still matters
    if(score > bestScore){
      bestScore = score;
      best = raw; // return raw — correct() is applied again in addItem()
    }
  }
  return best;
}

/* Smart categorization: score all categories and pick highest-priority match.
   If two categories match, the one with higher pri wins. */
function catOf(text){
  if(!text) return CATS[CATS.length - 1];
  let best = CATS[CATS.length - 1];
  let bestPri = -1;
  for(const cat of CATS){
    if(cat.pri <= bestPri) continue; // skip if can't beat current best
    for(const kw of cat.kw){
      if(kw.test(text)){
        if(cat.pri > bestPri){ best = cat; bestPri = cat.pri; }
        break; // found a match in this cat, move to next cat
      }
    }
  }
  return best;
}

/* persistence */
function save(){
  if(!CFG.autoSave) return;
  try{
    const slim = items.map(i => ({id:i.id, text:i.text, done:!!i.done, ts:i.ts}));
    localStorage.setItem('pipelog_items', JSON.stringify(slim));
    localStorage.setItem('pipelog_uid', String(uid));
    localStorage.setItem('pipelog_collapsed', JSON.stringify([...collapsedCats]));
  }catch(e){
    if(e && e.name === 'QuotaExceededError') showToast('Storage full — some items may not save', 'err');
  }
}

function load(){
  try{
    const raw = localStorage.getItem('pipelog_items');
    const u = localStorage.getItem('pipelog_uid');
    const col = localStorage.getItem('pipelog_collapsed');
    if(raw){
      const parsed = JSON.parse(raw);
      items = parsed.map(it => ({
        id: it.id,
        text: it.text,
        done: !!it.done,
        ts: it.ts || Date.now(),
        cat: catOf(it.text),
        brand: brandOf(it.text),
        meas: hasMeas(it.text),
      }));
    }
    if(u) uid = parseInt(u) || 1;
    if(col) collapsedCats = new Set(JSON.parse(col));
  }catch(e){
    console.warn('Failed to load saved data:', e);
  }
}

/* ══ ITEM OPS ══ */
function addItem(text){
  if(!text || !text.trim()) return;
  let t = parseMeas(correct(text.trim()));
  t = t.replace(/\bdwv\b/gi,'DWV').replace(/\btyler\b/gi,'Tyler').replace(/\bp-trap\b/gi,'P-trap').replace(/\bmip\b/gi,'MIP').replace(/\bfip\b/gi,'FIP').replace(/\bmht\b/gi,'MHT').replace(/\bnpt\b/gi,'NPT').replace(/\bpvc\b/gi,'PVC').replace(/\bcpvc\b/gi,'CPVC').replace(/\bpex\b/gi,'PEX').replace(/\bprv\b/gi,'PRV').replace(/\bab&i\b/gi,'AB&I').replace(/\babi\b/gi,'AB&I');
  if(!t) return;
  items.push({
    id: uid++,
    text: t,
    cat: catOf(t),
    brand: brandOf(t),
    meas: hasMeas(t),
    done: false,
    ts: Date.now(),
  });
  sessionCount++;
  save();
  updateStats();
  render();
}

function addManual(){
  const i = document.getElementById('manInp');
  if(i.value.trim()){ addItem(i.value.trim()); i.value = ''; i.focus(); }
}

function delItem(id){
  items = items.filter(i => i.id !== id);
  save(); updateStats(); render();
}

function toggleDone(id){
  const it = items.find(i => i.id === id);
  if(it){ it.done = !it.done; save(); updateStats(); render(); }
}

function commitEdit(id, txt){
  const it = items.find(i => i.id === id);
  if(!it) return;
  const trimmed = (txt || '').trim();
  if(!trimmed){ delItem(id); return; }
  const t = parseMeas(correct(trimmed));
  if(!t){ delItem(id); return; }
  if(t === it.text) return; // no change
  it.text = t;
  it.cat = catOf(t);
  it.brand = brandOf(t);
  it.meas = hasMeas(t);
  save(); updateStats(); render();
}





function clearAll(){
  if(!items.length) return;
  if(!confirm('Clear all ' + items.length + ' items? This cannot be undone.')) return;
  items = []; uid = 1; collapsedCats.clear();
  save(); updateStats(); render();
  showToast('List cleared', 'ok');
}

function getVisible(){
  const order = CATS.map(c => c.id);
  return [...items].sort((a, b) => order.indexOf(a.cat.id) - order.indexOf(b.cat.id));
}

function updateStats(){
  const hasItems = items.length > 0;

  if(sms) sms.disabled = !hasItems;

/* ══ RENDER ══ */
function esc(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function render(){
  const panel = document.getElementById('listPanel');
  const visible = getVisible();

  if(!visible.length){
    panel.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg><p>Start recording to build your list</p></div>`;
    renderNav([]);
    return;
  }

  const useGroups = fmtMode === 'grouped' || fmtMode === 'compact';
  let html = '', globalN = 1;
  const activeCats = [];

  if(useGroups){
    const catOrder = [...new Set(visible.map(i => i.cat.id))];
    for(const cid of catOrder){
      const cat = CAT_BY_ID[cid];
      const grp = visible.filter(i => i.cat.id === cid);
      if(!grp.length) continue;
      activeCats.push({...cat, count: grp.length});
      const collapsed = collapsedCats.has(cid);
      html += `<div class="cat-group${collapsed ? ' collapsed' : ''}" id="grp-${cid}">
        <div class="cat-group-hdr" data-cat="${cid}">
          <span class="cgh-dot" style="background:${cat.color}"></span>
          <span class="cgh-name">${esc(cat.label)}</span>
          <div class="cgh-meta">
            <span class="cgh-count">${grp.length}</span>
            <span class="cgh-toggle">▾</span>
          </div>
        </div>
        <div class="cat-group-body">`;
      for(const it of grp) html += rowHTML(it, globalN++);
      html += `</div></div>`;
    }
  } else {
    // bullets or numbered — flat list, no category headers
    for(const it of visible) html += rowHTML(it, globalN++);
    // Still populate nav for sidebar
    const catOrder = [...new Set(visible.map(i => i.cat.id))];
    for(const cid of catOrder){
      const cat = CAT_BY_ID[cid];
      const grp = visible.filter(i => i.cat.id === cid);
      if(grp.length) activeCats.push({...cat, count: grp.length});
    }
  }

  panel.innerHTML = html;
  renderNav(activeCats);
}

function rowHTML(it, n){
  const brand = it.brand && CFG.detectBrand ? `<span class="brand-tag br-${it.brand.id}">${esc(it.brand.label)}</span>` : '';
  const meas = it.meas && CFG.detectMeas ? '<span class="meas-tag">📐</span>' : '';
  // Marker adapts to format mode
  let marker;
  if(fmtMode === 'bullets'){
    marker = `<div class="item-num item-bullet">•</div>`;
  } else {
    marker = `<div class="item-num">${String(n).padStart(2, '0')}</div>`;
  }
  return `<div class="item${it.done ? ' done' : ''}" data-id="${it.id}">
    ${marker}
    <div class="item-body">
      <div class="item-text" contenteditable="true" data-edit="${it.id}" spellcheck="false">${esc(it.text)}</div>
      <div class="item-tags">${brand}${meas}</div>
    </div>
    <div class="item-actions">
      <button class="ia ok" type="button" data-toggle="${it.id}">${it.done ? '↩' : '✓'}</button>
      <button class="ia del" type="button" data-del="${it.id}">✕</button>
    </div>
  </div>`;

/* ══ SPEECH RECOGNITION ══ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const SGL = window.SpeechGrammarList || window.webkitSpeechGrammarList;
const VOCAB = [
  // Copper pipe
  "copper pipe","DWV copper pipe","type L copper pipe","type K copper pipe","type M copper pipe",
  "black iron pipe","galvanized pipe","PVC pipe","CPVC pipe","PEX pipe","schedule 40","schedule 80",
  // Copper fittings
  "copper 90 elbow","copper 45 elbow","copper street 90","copper street 45",
  "copper tee","copper coupling","copper cap","copper union","copper reducer",
  "copper MIP adapter","copper FIP adapter","copper MHT adapter",
  "LF copper MIP union","LF copper FIP union",
  "copper test cap","copper DWV long turn 90","copper DWV 45","copper DWV coupling",
  "copper DWV P-trap","copper DWV adapter",
  // Cast iron pipe
  "cast iron pipe","cast iron soil pipe","service weight cast iron","extra heavy cast iron",
  "Tyler cast iron pipe","AB&I cast iron pipe",
  // Cast iron fittings — Tyler & AB&I
  "cast iron 90","cast iron 45","cast iron long turn 90","cast iron short turn 90",
  "cast iron tee","cast iron wye","cast iron sanitary tee","cast iron combo",
  "cast iron reducer","cast iron P-trap","cast iron test cap",
  "cast iron coupling","cast iron hub coupling",
  // No-hub bands
  "no-hub band","no-hub coupling","no-hub clamp",
  "2 inch no-hub band","3 inch no-hub band","4 inch no-hub band",
  "6 inch no-hub band","8 inch no-hub band",
  "Tyler no-hub band","AB&I no-hub band","Mission no-hub band",
  // Hangers & strut
  "j hanger","clevis hanger","riser clamp","pipe clamp","pipe strap",
  "all thread rod","unistrut channel","half slot channel",
  // Valves
  "ball valve","gate valve","check valve","angle stop","pressure reducing valve",
  // Common callouts
  "90 degree elbow","45 degree elbow","street elbow",
  "MIP","FIP","MHT","NPT","sweat","ProPress",
];
function initSR(){
  if(!SR) return false;
  try{
    recog = new SR();
  }catch(e){
    return false;
  }
  recog.continuous = true;
  recog.interimResults = true;
  recog.maxAlternatives = 5;   // We score all 5 via pickBestAlt()
  recog.lang = 'en-US';

  if(SGL){
    try{
      const g = new SGL();
      g.addFromString('#JSGF V1.0; grammar t; public <t>=' + VOCAB + ';', 1);
      recog.grammars = g;
    }catch(e){ /* grammar optional */ }
  }

  recog.onresult = (ev) => {
    resetSilenceTimer();
    let interim = '';
    for(let i = ev.resultIndex; i < ev.results.length; i++){
      const res = ev.results[i];
      const best = pickBestAlt(res);
      if(res.isFinal){
        const text = best.trim();
        if(text) addItem(text);
        setPrev('');
      }else{
        interim += best;
      }
    }
    if(interim) setPrev('…' + correct(interim));
  };

  recog.onspeechstart = () => { resetSilenceTimer(); };

  recog.onerror = (ev) => {
    if(ev.error === 'no-speech'){
      if(isRec && !isSleeping && !restartPending){
        restartPending = true;
        setTimeout(() => { try{ recog.stop(); }catch(e){} }, 100);
      }
      return;
    }
    if(['network', 'audio-capture', 'aborted'].includes(ev.error)){
      if(isRec && !restartPending){
        restartPending = true;
        setTimeout(() => { try{ recog.stop(); }catch(e){} }, 200);
      }
      return;
    }
    if(ev.error === 'not-allowed' || ev.error === 'service-not-allowed'){
      isRec = false; isSleeping = false;
      setRecState(false); showMicBanner('denied');
      return;
    }
    console.warn('SR error:', ev.error);
  };

  recog.onend = () => {
    restartPending = false;
    if(isRec && !isSleeping){
      setTimeout(() => {
        try{ recog.start(); }catch(e){ isRec = false; setRecState(false); }
      }, 120);
    } else if(!isRec){ setRecState(false); }
  };

  return true;
}

function resetSilenceTimer(){
  clearTimeout(silenceTimer); clearInterval(sleepCountdown); sleepCountdown = null;
  if(isSleeping) wakeFromSleep();
  if(!isRec) return;
  let remaining = Math.round(SLEEP_AFTER_MS / 1000);
  sleepCountdown = setInterval(() => {
    remaining--;
    if(remaining <= 4 && remaining > 0 && isRec && !isSleeping)
      document.getElementById('sessInfo').textContent = `Sleeping in ${remaining}s — speak to stay active`;
    if(remaining <= 0) clearInterval(sleepCountdown);
  }, 1000);
  silenceTimer = setTimeout(() => { if(isRec && !isSleeping) goToSleep(); }, SLEEP_AFTER_MS);
}
function goToSleep(){
  if(!isRec || isSleeping) return;
  isSleeping = true;
  clearTimeout(silenceTimer); clearInterval(sleepCountdown);
  try{ recog.stop(); }catch(e){}
  setRecState('sleeping');
  setPrev('Sleeping — tap button or speak to wake');
  showToast('Mic sleeping — tap to wake', 'info');
}
function wakeFromSleep(){
  if(!isSleeping) return;
  isSleeping = false;
  setRecState('live');
  try{ recog.start(); }catch(e){}
  setPrev(''); updateSessionInfo(); resetSilenceTimer();
}
function toggleRec(){
  if(!SR){ showMicBanner('no-sr'); return; }
  if(!recog && !initSR()){ showToast('Failed to initialize speech recognition', 'err'); return; }
  if(isSleeping){ wakeFromSleep(); return; }
  if(isRec){
    isRec = false; isSleeping = false;
    clearTimeout(silenceTimer); clearInterval(sleepCountdown);
    try{ recog.stop(); }catch(e){}
    if(sessionTimer){ clearInterval(sessionTimer); sessionTimer = null; }
    setPrev('Tap to record — auto-sleeps after silence');
  }else{
    isRec = true; isSleeping = false;
    sessionStart = Date.now(); sessionCount = 0;
    sessionTimer = setInterval(updateSessionInfo, 1000);
    updateSessionInfo();
    try{ recog.start(); }catch(e){
      isRec = false; setRecState(false);
      showToast('Could not start recording', 'err'); return;
    }
    setRecState('live'); resetSilenceTimer();
  }
}
function setRecState(state){
  const on = state === 'live' || state === 'sleeping';
  if(state !== 'sleeping') isRec = on;
  const btn = document.getElementById('recBtn');
  btn.className = state === 'live' ? 'live' : state === 'sleeping' ? 'sleeping' : 'idle';
  if(state === 'live'){
    document.getElementById('btnLbl').textContent = 'RECORDING — SPEAK FREELY';
    hideMicBanner();
  } else if(state === 'sleeping'){
    document.getElementById('btnLbl').textContent = 'SLEEPING — TAP TO WAKE';
  } else {
    isSleeping = false;
    document.getElementById('btnLbl').textContent = 'START RECORDING';
    setPrev('Tap to record — auto-sleeps after silence');
    const si = document.getElementById('sessInfo');
    if(sessionStart && sessionCount){
      si.textContent = 'Last session: ' + sessionCount + ' item' + (sessionCount !== 1 ? 's' : '') + ' captured';
    }else{ si.textContent = 'Session: ready'; }
  }
}
function setPrev(t){
  const el = document.getElementById('livePrev');
  el.textContent = t || 'Tap to record — auto-sleeps after silence';
}

function updateSessionInfo(){
  if(!sessionStart) return;
  const s = Math.floor((Date.now() - sessionStart) / 1000);
  const mm = Math.floor(s / 60).toString().padStart(2, '0');
  const ss = (s % 60).toString().padStart(2, '0');
  document.getElementById('sessInfo').textContent = `Recording: ${mm}:${ss} · ${sessionCount} this session`;
}

  let n = 1;

  if(true){ // always category sort

    for(const cid of catOrder){
      const cat = CAT_BY_ID[cid];
      const grp = visible.filter(i => i.cat.id === cid);

      for(const it of grp){

      }
      body += '\n';
    }

  // Try clipboard first (more reliable across devices)
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(body).then(() => {

    }).catch(() => {

  // Then try to open SMS app
  setTimeout(() => {
    try{
      window.location.href = 'sms:?body=' + encodeURIComponent(body);
    }catch(e){}
  }, 400);
}

function fallbackCopy(text){
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard', 'ok');
  }catch(e){
    prompt('Copy your list:', text);
  }
}

/* ══ MIC PERMISSION CHECK ══ */
function isIOS(){
  return /iP(hone|od|ad)/.test(navigator.userAgent);
}
function isChromeiOS(){
  return isIOS() && /CriOS/.test(navigator.userAgent);
}
function isSafari(){
  return /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);
}

function showMicBanner(type){
  const banner = document.getElementById('micBanner');
  const title  = document.getElementById('micBannerTitle');
  const msg    = document.getElementById('micBannerMsg');
  if(!banner) return;

  if(type === 'denied'){
    title.textContent = 'Microphone access blocked';
    msg.innerHTML = isIOS()
      ? 'Go to <strong>Settings → Safari → Microphone</strong> and allow access, then reload.'
      : 'Click the <strong>lock icon</strong> in the address bar → <strong>Site settings</strong> → set Microphone to <strong>Allow</strong>, then reload.';
    banner.className = 'mic-banner';
  } else if(type === 'chrome-ios'){
    banner.className = 'mic-banner ios';
    title.textContent = 'Switch to Safari on iPhone';
    msg.innerHTML = 'Chrome on iPhone cannot access the microphone due to Apple restrictions. Open this page in <strong>Safari</strong> for voice recording to work.';
  } else if(type === 'no-sr'){
    title.textContent = 'Speech recognition not available';
    msg.innerHTML = 'Use <strong>Chrome</strong>, <strong>Edge</strong>, or <strong>Safari (iOS 14.5+)</strong> for voice recording.';
    banner.className = 'mic-banner';
  } else if(type === 'prompt'){
    banner.className = 'mic-banner ios';
    title.textContent = 'Microphone permission needed';
    msg.innerHTML = 'Tap <strong>START RECORDING</strong> — when the browser asks, tap <strong>Allow</strong> to enable your microphone.';
  }

  banner.style.display = 'flex';
}

function hideMicBanner(){
  const banner = document.getElementById('micBanner');
  if(banner) banner.style.display = 'none';
}

async function checkMicPermission(){
  // Chrome on iOS — mic unavailable, show redirect
  if(isChromeiOS()){
    showMicBanner('chrome-ios');
    return;
  }

  // No Web Speech API at all
  if(!window.SpeechRecognition && !window.webkitSpeechRecognition){
    showMicBanner('no-sr');
    return;
  }

  // Use Permissions API if available (Chrome/Edge desktop & Android)
  if(navigator.permissions && navigator.permissions.query){
    try{
      const result = await navigator.permissions.query({name:'microphone'});
      if(result.state === 'denied'){
        showMicBanner('denied');
      } else if(result.state === 'prompt'){
        // First visit — show a gentle nudge so they know to tap Allow
        showMicBanner('prompt');
      }
      // 'granted' → no banner needed, stay clean
      result.onchange = () => {
        if(result.state === 'granted') hideMicBanner();
        if(result.state === 'denied')  showMicBanner('denied');
      };
      return;
    }catch(e){
      // Permissions API not supported — fall through to silent
    }
  }

  // iOS Safari — Permissions API not available.
  // Show the gentle prompt nudge so user knows what to expect.
  if(isIOS() && isSafari()){
    showMicBanner('prompt');
  }
}

    document.getElementById('fab').classList.toggle('show', lp.scrollTop > 300);
  }, {passive: true});
  document.getElementById('fab').addEventListener('click', scrollTop);

  document.addEventListener('keydown', (e) => {
    if(e.code === 'Space' && !e.target.matches('input, textarea, [contenteditable]')){
      e.preventDefault();
      toggleRec();

  // Warn before leaving if recording or unsaved items
  window.addEventListener('beforeunload', (e) => {
    if(isRec){
      e.preventDefault();

  // Mic banner close button
  document.getElementById('micBannerClose').addEventListener('click', hideMicBanner);

  // Initial render after DOM is ready
  updateStats();
  render();

  // Check mic permission — show banner if blocked or needs prompt
  checkMicPermission();
});

/* ══ INIT ══ */
load();

/* PWA service worker registration (optional, only if sw.js exists) */
if('serviceWorker' in navigator && location.protocol === 'https:'){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
